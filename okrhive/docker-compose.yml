version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: okrdb
      POSTGRES_USER: okruser
      POSTGRES_PASSWORD: okrpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      DB_NAME: okrdb
      DB_USER: okruser
      DB_PASSWORD: okrpassword
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: